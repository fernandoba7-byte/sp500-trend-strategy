<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SP500 Trend Strategy — E2 Signal Dashboard</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --yellow: #d29922; --orange: #db6d28; --red: #f85149;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); padding: 20px; max-width: 960px; margin: 0 auto; }
  h1 { font-size: 1.4em; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 0.9em; margin-bottom: 24px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  .card-title { font-size: 0.8em; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 12px; }
  .signal-badge { display: inline-block; padding: 8px 16px; border-radius: 6px; font-weight: 600; font-size: 1.1em; }
  .signal-100 { background: rgba(63,185,80,0.15); color: var(--green); border: 1px solid rgba(63,185,80,0.3); }
  .signal-66 { background: rgba(210,153,34,0.15); color: var(--yellow); border: 1px solid rgba(210,153,34,0.3); }
  .signal-33 { background: rgba(219,109,40,0.15); color: var(--orange); border: 1px solid rgba(219,109,40,0.3); }
  .signal-0 { background: rgba(248,81,73,0.15); color: var(--red); border: 1px solid rgba(248,81,73,0.3); }
  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-top: 12px; }
  .metric { text-align: center; }
  .metric-value { font-size: 1.5em; font-weight: 700; }
  .metric-label { font-size: 0.75em; color: var(--muted); margin-top: 2px; }
  .sub-signal { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .sub-signal:last-child { border-bottom: none; }
  .check { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75em; font-weight: 700; flex-shrink: 0; }
  .check-on { background: rgba(63,185,80,0.2); color: var(--green); }
  .check-off { background: rgba(248,81,73,0.2); color: var(--red); }
  .pending-box { background: rgba(210,153,34,0.1); border: 1px solid rgba(210,153,34,0.3); border-radius: 6px; padding: 12px; margin-top: 12px; }
  .pending-box .title { color: var(--yellow); font-weight: 600; margin-bottom: 4px; }
  .watch-item { padding: 6px 0; display: flex; gap: 8px; align-items: flex-start; }
  .watch-icon { flex-shrink: 0; }
  .dca-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
  .dca-table th, .dca-table td { padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); }
  .dca-table th { color: var(--muted); font-size: 0.75em; text-transform: uppercase; }
  .dca-table td { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.9em; }
  table.history { width: 100%; border-collapse: collapse; font-size: 0.8em; margin-top: 8px; }
  table.history th { color: var(--muted); text-transform: uppercase; font-size: 0.7em; letter-spacing: 0.03em; padding: 6px 6px; text-align: right; border-bottom: 1px solid var(--border); }
  table.history th:first-child { text-align: left; }
  table.history td { padding: 5px 6px; text-align: right; border-bottom: 1px solid rgba(48,54,61,0.5); font-family: 'SF Mono', 'Fira Code', monospace; }
  table.history td:first-child { text-align: left; }
  .alloc-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
  .loading { text-align: center; padding: 40px; color: var(--muted); }
  .footer { text-align: center; color: var(--muted); font-size: 0.75em; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); }
</style>
</head>
<body>

<h1>SP500 Trend Strategy</h1>
<p class="subtitle">E2 Composite Signal Dashboard</p>

<div id="app"><div class="loading">Loading signal data...</div></div>

<div class="footer">
  E2 Composite Signal &mdash; Top 5 S&amp;P 500 by Market Cap &mdash; Updated daily after market close
</div>

<script>
const ALLOC_COLORS = { 100: 'var(--green)', 66: 'var(--yellow)', 33: 'var(--orange)', 0: 'var(--red)' };
const ALLOC_LABELS = {
  1.0: '100% Equities', 0.66: '66% Equities / 34% SGOV',
  0.33: '33% Equities / 67% SGOV', 0.0: '0% Equities / 100% SGOV'
};
const ALLOC_STATUS = { 1.0: 'FULL RISK-ON', 0.66: 'MODERATE', 0.33: 'DEFENSIVE', 0.0: 'FULL RISK-OFF' };

function allocClass(a) { return 'signal-' + Math.round(a * 100); }
function allocColor(a) { return ALLOC_COLORS[Math.round(a * 100)] || 'var(--muted)'; }
function dotColor(a) {
  const c = Math.round((a !== null && a !== undefined ? a : 0) * 100);
  return ALLOC_COLORS[c] || 'var(--muted)';
}

function render(d) {
  const s = d.signal;
  const allocPct = Math.round(s.confirmed_allocation * 100);
  const subs = s.sub_signals;

  let html = '';

  // ── Confirmed Signal Card
  html += `<div class="card">
    <div class="card-title">Confirmed Signal</div>
    <div style="display:flex; align-items:center; gap:16px; flex-wrap:wrap">
      <span class="signal-badge ${allocClass(s.confirmed_allocation)}">${ALLOC_STATUS[s.confirmed_allocation] || allocPct+'%'}</span>
      <span style="color:var(--muted)">Active for ${s.days_at_confirmed || '?'} trading days</span>
    </div>
    <div class="metric-grid">
      <div class="metric"><div class="metric-value">${allocPct}%</div><div class="metric-label">Equity Allocation</div></div>
      <div class="metric"><div class="metric-value">$${d.date ? d.history?.[d.history.length-1]?.spy_close || '—' : '—'}</div><div class="metric-label">SPY Close</div></div>
      <div class="metric"><div class="metric-value">${s.raw_score}/3</div><div class="metric-label">Raw Score</div></div>
      <div class="metric"><div class="metric-value">${d.date}</div><div class="metric-label">Last Updated</div></div>
    </div>`;

  // Pending change
  if (s.pending_change) {
    const pc = s.pending_change;
    const pAlloc = Math.round(pc.pending_alloc * 100);
    html += `<div class="pending-box">
      <div class="title">Pending Change Detected</div>
      <div>New level: <strong>${pAlloc}% equities</strong> (${ALLOC_STATUS[pc.pending_alloc] || ''})</div>
      <div>Confirmation: <strong>${pc.days_counted} / 3 days</strong> &mdash; ${pc.days_remaining} day(s) remaining</div>
    </div>`;
  }
  html += `</div>`;

  // ── Sub-signals Card
  html += `<div class="card"><div class="card-title">E2 Score Breakdown</div>`;
  const subNames = { ema200: 'Trend (EMA200)', adx_di: 'Strength (ADX + DI)', roc126: 'Momentum (ROC 126d)' };
  for (const [key, sub] of Object.entries(subs)) {
    const on = sub.value;
    html += `<div class="sub-signal">
      <div class="check ${on ? 'check-on' : 'check-off'}">${on ? '+' : '-'}</div>
      <div><strong>${subNames[key] || key}</strong><br><span style="color:var(--muted);font-size:0.85em">${sub.detail}</span></div>
    </div>`;
  }
  html += `</div>`;

  // ── What to Watch
  if (d.watch && d.watch.length) {
    html += `<div class="card"><div class="card-title">What to Watch</div>`;
    for (const w of d.watch) {
      const icon = w.icon === 'above' ? '<span style="color:var(--green)">&#9650;</span>' :
                   w.icon === 'warning' ? '<span style="color:var(--yellow)">&#9888;</span>' :
                   '<span style="color:var(--red)">&#9660;</span>';
      html += `<div class="watch-item"><span class="watch-icon">${icon}</span><span>${w.text}</span></div>`;
    }
    html += `</div>`;
  }

  // ── Monthly DCA
  if (d.dca) {
    html += `<div class="card"><div class="card-title">Monthly DCA Split ($${d.dca.monthly_deposit.toLocaleString()})</div>
      <table class="dca-table"><thead><tr><th>Ticker</th><th>Amount</th></tr></thead><tbody>`;
    for (const t of d.portfolio.tickers) {
      html += `<tr><td>${t}</td><td>$${d.dca.per_stock.toFixed(2)}</td></tr>`;
    }
    html += `<tr><td><strong>${d.portfolio.cash_etf}</strong></td><td><strong>$${d.dca.sgov.toFixed(2)}</strong></td></tr>`;
    html += `</tbody></table></div>`;
  }

  // ── Recent History
  if (d.history && d.history.length) {
    html += `<div class="card"><div class="card-title">Recent Signal History (${d.history.length} days)</div>
      <div style="overflow-x:auto"><table class="history"><thead>
        <tr><th>Date</th><th>SPY</th><th>EMA200</th><th>ADX</th><th>+DI/-DI</th><th>ROC</th><th>Score</th><th>Alloc</th></tr>
      </thead><tbody>`;
    for (const h of d.history) {
      const aColor = dotColor(h.confirmed_alloc);
      const allocLabel = h.confirmed_alloc !== null ? Math.round(h.confirmed_alloc * 100) + '%' : '—';
      html += `<tr>
        <td>${h.date}</td>
        <td>$${h.spy_close.toFixed(2)}</td>
        <td>$${h.ema200.toFixed(2)}</td>
        <td>${h.adx.toFixed(1)}</td>
        <td>${h.plus_di.toFixed(1)} / ${h.minus_di.toFixed(1)}</td>
        <td>${h.roc126 !== null ? h.roc126.toFixed(1) + '%' : '—'}</td>
        <td>${h.raw_score !== null ? h.raw_score + '/3' : '—'}</td>
        <td><span class="alloc-dot" style="background:${aColor}"></span>${allocLabel}</td>
      </tr>`;
    }
    html += `</tbody></table></div></div>`;
  }

  document.getElementById('app').innerHTML = html;
}

// Load data
fetch('data.json')
  .then(r => r.json())
  .then(render)
  .catch(err => {
    document.getElementById('app').innerHTML =
      `<div class="card" style="color:var(--red)">Error loading data: ${err.message}<br><br>
       <span style="color:var(--muted)">Make sure the daily workflow has run at least once.</span></div>`;
  });
</script>
</body>
</html>
